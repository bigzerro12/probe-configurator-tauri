# Published GitHub Releases (installers on the Releases tab), same idea as electron-builder publish.
# Triggers only on version tags — unlike CI, this does not run on every push to main.
# Requires: Settings → Actions → General → Workflow permissions → Read and write.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macos-aarch64
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            name: macos-x64
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            name: linux-x64
            args: ""
          - platform: windows-latest
            name: windows-x64
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Same as CI: use @tauri-apps/cli from node_modules (not cargo-tauri).
          tauriScript: yarn tauri
          tagName: ${{ github.ref_name }}
          # Match typical GitHub release title (e.g. probe-configurator-electron style).
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            **ProbeConfigurator** — installers attached below per platform (Windows, Linux, macOS Intel, macOS Apple Silicon).

            Built from tag `${{ github.ref_name }}`. Unsigned builds may show SmartScreen / Gatekeeper warnings until code signing is configured.
          generateReleaseNotes: true
          # Public release on the Releases tab (like electron releases), not a hidden draft.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
