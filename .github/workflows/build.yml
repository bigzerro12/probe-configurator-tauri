# Tag + manual builds that publish one GitHub Release (Electron-style: build matrix → single release job).
# Does not replace ci.yml (PR / main smoke tests). Settings → Actions → Workflow permissions → Read and write.
name: Build ProbeConfigurator

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (Windows)
        run: yarn tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            src-tauri/target/release/bundle/nsis/
            src-tauri/target/release/bundle/msi/
          if-no-files-found: warn
          retention-days: 14

  # macos-latest = Apple Silicon. Native `tauri build` (no --target) uses host aarch64 and
  # matches DMG tooling; explicit --target aarch64-apple-darwin still trips bundle_dmg.sh on some runners.
  build-macos-aarch64:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (macOS Apple Silicon)
        run: yarn tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos-aarch64
          path: |
            src-tauri/target/release/bundle/dmg/
            src-tauri/target/release/bundle/macos/
          if-no-files-found: warn
          retention-days: 14

  # Intel DMG: must run on an x86_64 runner. macos-latest is Apple Silicon — cross-compiled
  # x86_64 builds often fail in bundle_dmg.sh; macos-13 is GitHub's Intel macOS image.
  build-macos-x64:
    runs-on: macos-13
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Native x86_64 build (no --target). Cross-target DMG bundling on arm64 hosts often breaks bundle_dmg.sh.
      - name: Build & package (macOS Intel)
        run: yarn tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos-x64
          path: |
            src-tauri/target/release/bundle/dmg/
            src-tauri/target/release/bundle/macos/
          if-no-files-found: warn
          retention-days: 14

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (Linux)
        run: yarn tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
          if-no-files-found: warn
          retention-days: 14

  release:
    needs:
      - build-windows
      - build-macos-aarch64
      - build-macos-x64
      - build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            bundle-windows/**/*
            bundle-macos-aarch64/**/*
            bundle-macos-x64/**/*
            bundle-linux/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
